services:
  # ---------- Application Tier ----------
  incidentiq-frontend:
    container_name: incidentiq-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - incidentiq-core
    networks:
      - incidentiq-net

  incidentiq-core:
    container_name: incidentiq-core
    build:
      context: ../backend-core
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://incidentiq-postgres:5432/incidentiq
      DB_USERNAME: incidentiq
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: incidentiq-redis
      REDIS_PORT: 6379
      ES_URIS: http://incidentiq-elasticsearch:9200
      KAFKA_BOOTSTRAP_SERVERS: incidentiq-kafka:29092
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      CORS_ALLOWED_ORIGINS: http://localhost
    depends_on:
      incidentiq-postgres:
        condition: service_started
      incidentiq-redis:
        condition: service_started
      incidentiq-elasticsearch:
        condition: service_started
      incidentiq-kafka:
        condition: service_started
    networks:
      - incidentiq-net

  incidentiq-ai:
    container_name: incidentiq-ai
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: incidentiq-kafka:29092
      CORE_SERVICE_URL: http://incidentiq-core:8080
      OLLAMA_BASE_URL: http://incidentiq-ollama:11434
      ES_URIS: http://incidentiq-elasticsearch:9200
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
    depends_on:
      - incidentiq-kafka
      - incidentiq-ollama
      - incidentiq-elasticsearch
    networks:
      - incidentiq-net

  # ---------- Data Tier ----------
  incidentiq-postgres:
    container_name: incidentiq-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: incidentiq
      POSTGRES_USER: incidentiq
      POSTGRES_PASSWORD: ${DB_PASSWORD:-incidentiq}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - incidentiq-net

  incidentiq-redis:
    container_name: incidentiq-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - incidentiq-net

  incidentiq-elasticsearch:
    container_name: incidentiq-elasticsearch
    image: elasticsearch:9.0.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - incidentiq-net

  # ---------- Messaging Tier ----------
  incidentiq-zookeeper:
    container_name: incidentiq-zookeeper
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - incidentiq-net
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  incidentiq-kafka:
    container_name: incidentiq-kafka
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      incidentiq-zookeeper:
        condition: service_healthy
    restart: on-failure
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: incidentiq-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://incidentiq-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - incidentiq-net

  # ---------- AI Runtime Tier ----------
  incidentiq-ollama:
    container_name: incidentiq-ollama
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - incidentiq-net

volumes:
  postgres-data:
  esdata:
  ollama-models:

networks:
  incidentiq-net:
    driver: bridge
